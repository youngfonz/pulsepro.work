<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Pro — Soft Launch QA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, system-ui, sans-serif; background: #fafafa; color: #171717; padding: 40px 20px; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #737373; margin-bottom: 32px; }
    .progress-bar { background: #e5e5e5; border-radius: 8px; height: 8px; margin-bottom: 32px; overflow: hidden; }
    .progress-fill { background: #3b82f6; height: 100%; border-radius: 8px; transition: width 0.3s ease; }
    .progress-text { font-size: 13px; color: #737373; margin-bottom: 8px; font-weight: 500; }
    .section { margin-bottom: 28px; }
    .section-title { font-size: 15px; font-weight: 600; color: #171717; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e5e5e5; }
    .item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; cursor: pointer; user-select: none; }
    .item:hover { background: #f5f5f5; margin: 0 -8px; padding: 8px; border-radius: 6px; }
    .item input[type="checkbox"] { width: 18px; height: 18px; margin-top: 1px; accent-color: #3b82f6; cursor: pointer; flex-shrink: 0; }
    .item label { font-size: 14px; line-height: 1.5; color: #404040; cursor: pointer; }
    .item.checked label { color: #a3a3a3; text-decoration: line-through; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', Menlo, monospace; }
    .reset-btn { display: inline-block; margin-top: 24px; padding: 8px 16px; font-size: 13px; color: #737373; background: #fff; border: 1px solid #d4d4d4; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .reset-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pulse Pro — Soft Launch QA</h1>
    <p class="subtitle">April 4, 2026 &middot; Conference prep</p>
    <p class="progress-text"><span id="count">0</span> of <span id="total">0</span> checked</p>
    <div class="progress-bar"><div class="progress-fill" id="bar" style="width:0%"></div></div>
    <div id="sections"></div>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>

<script>
const data = [
  { title: "Auth & Onboarding", items: [
    "Sign up with new email → onboarding overlay appears",
    "Sign in with Google → lands on dashboard",
    "Sign out → redirected to marketing page",
    "Visit <code>/dashboard</code> while logged out → redirected to sign-in",
  ]},
  { title: "Dashboard", items: [
    "Activity rings render with correct data",
    "DnD grid sections can be reordered",
    "Overdue tasks section shows if any exist",
    "Upcoming section shows tasks due today",
    "Project health cards show correct status colors",
    "AI Insights panel loads (Pro feature)",
  ]},
  { title: "Projects", items: [
    "Projects list loads quickly (no spinner hanging)",
    "Health labels (Healthy / At Risk / Critical) display correctly",
    "Create new project → appears in list",
    "Open project → tabs work (Tasks, Bookmarks, Time, Files, Team)",
    "Task list within project loads with correct counts",
  ]},
  { title: "Tasks", items: [
    "Create task from project view",
    "Create task from <code>/tasks</code> page",
    "Toggle task complete / incomplete",
    "Add a comment → your name appears as author",
    "Delete your own comment → works",
    "Try deleting someone else's comment → blocked (unless manager+)",
    "Quick Add (press <code>N</code> key) → overlay works",
  ]},
  { title: "Clients", items: [
    "Create client → appears in list",
    "Client detail shows linked projects",
  ]},
  { title: "Invoices", items: [
    "Create invoice with line items",
    "Send invoice via email",
    "Open shared invoice link (logged out) → public view works",
  ]},
  { title: "Team Collaboration", items: [
    "Add a collaborator to a project (Pro/Team plan)",
    "Collaborator can see the project",
    "Collaborator (editor) can add/edit tasks",
    "Collaborator (viewer) can only read",
    "Remove collaborator → they lose access",
  ]},
  { title: "Upgrade Prompts (test on Free plan)", items: [
    "Hit 3 project limit → upgrade modal appears",
    "Hit 50 task limit → upgrade modal appears",
    "Hit 1 client limit → upgrade modal appears",
    "Try adding collaborator on Free → 'Upgrade to Pro' message",
    "Click upgrade → redirected to Polar checkout",
    "After upgrade → limits removed, plan shows Pro in settings",
  ]},
  { title: "Settings & Billing", items: [
    "Settings page loads with current plan info",
    "Usage bars show correct counts (projects / tasks / clients)",
    "'Manage Billing' link works for paid users",
    "Promo code input works (if applicable)",
  ]},
  { title: "Search & Navigation", items: [
    "<code>Cmd+K</code> command bar → search returns results",
    "Global search finds projects, tasks, clients, bookmarks",
    "Sidebar navigation works for all routes",
    "Calendar page loads",
  ]},
  { title: "Marketing / Public Pages", items: [
    "Landing page loads fast (server components)",
    "Pricing section shows correct plans",
    "<code>/about</code>, <code>/contact</code>, <code>/privacy</code>, <code>/terms</code> all load",
    "Knowledge base renders (public vs auth layout)",
  ]},
];

const STORAGE_KEY = 'pulsepro-qa-checks';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateProgress() {
  const boxes = document.querySelectorAll('input[type="checkbox"]');
  const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
  document.getElementById('count').textContent = checked;
  document.getElementById('total').textContent = boxes.length;
  const pct = boxes.length ? (checked / boxes.length * 100) : 0;
  const bar = document.getElementById('bar');
  bar.style.width = pct + '%';
  bar.style.background = pct === 100 ? '#22c55e' : '#3b82f6';
}

function render() {
  const state = loadState();
  const container = document.getElementById('sections');
  container.innerHTML = '';
  let idx = 0;

  data.forEach(section => {
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `<div class="section-title">${section.title}</div>`;

    section.items.forEach(text => {
      const id = 'q' + idx;
      const checked = state[id] || false;
      const item = document.createElement('div');
      item.className = 'item' + (checked ? ' checked' : '');
      item.innerHTML = `<input type="checkbox" id="${id}" ${checked ? 'checked' : ''}><label for="${id}">${text}</label>`;
      item.querySelector('input').addEventListener('change', function() {
        const s = loadState();
        s[id] = this.checked;
        saveState(s);
        item.className = 'item' + (this.checked ? ' checked' : '');
        updateProgress();
      });
      div.appendChild(item);
      idx++;
    });

    container.appendChild(div);
  });

  updateProgress();
}

function resetAll() {
  if (!confirm('Reset all checkboxes?')) return;
  localStorage.removeItem(STORAGE_KEY);
  render();
}

render();
</script>
</body>
</html>
